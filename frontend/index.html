<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chess Coach AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@4/assets/styles/cm-chessboard.css">
    <style>
        .layout-wrapper { display: flex; flex-direction: column; gap: 20px; padding: 20px; font-family: sans-serif; max-width: 1400px; margin: 0 auto; }
        .top-row { display: flex; gap: 20px; }
        #board { width: 500px; max-width: 100%; min-width: 300px; aspect-ratio: 1/1; resize: horizontal; overflow: hidden; padding-right: 5px; padding-bottom: 5px; border: 1px solid transparent; }
        #coach-pane { width: 100%; padding: 20px; border: 1px solid #ddd; background: #fafafa; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        #pgn-pane { width: 350px; padding: 20px; border: 1px solid #ddd; background: #fff; border-radius: 8px; overflow-y: auto; max-height: 500px; box-sizing: border-box; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        textarea { width: 100%; height: 100px; margin-top: 5px; }
        #output code { background-color: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-family: monospace; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 14px; }
        .pgn-moves { display: flex; flex-wrap: wrap; gap: 8px 12px; font-size: 14px; }
        .pgn-pair { display: flex; gap: 8px; }
        .pgn-move-num { font-weight: bold; width: 24px; color: #555; }
        .pgn-move { cursor: pointer; padding: 2px 4px; border-radius: 4px; }
        .pgn-move:hover { background: #e0e0e0; }
        .pgn-move.active { background: #007bff; color: white; font-weight: bold; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div style="padding: 10px 20px;"><a href="settings.html">⚙️ Settings</a></div>
<div class="layout-wrapper">
    <div class="top-row">
        <div id="board"></div>
        <div id="pgn-pane">
            <h3>Game History</h3>
            <div id="pgn-moves" class="pgn-moves"></div>
        </div>
    </div>
    <div id="coach-pane">
        <h3>Chess Coach AI</h3>
        <div id="loading" style="display: none;"><div class="spinner"></div> <span>Analyzing your position...</span></div>
        <p id="output">Make a move to begin analysis...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
    import { Chess } from "https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.6/+esm";
    import { Chessboard, INPUT_EVENT_TYPE, MARKER_TYPE } from "https://cdn.jsdelivr.net/npm/cm-chessboard@4/src/cm-chessboard/Chessboard.js";

    const game = new Chess();
    const board = new Chessboard(document.getElementById("board"), {
        position: game.fen(),
        sprite: { url: "https://cdn.jsdelivr.net/npm/cm-chessboard@4/assets/images/chessboard-sprite.svg" }
    });

    let currentPly = 0;
    let initialFen = game.fen();
    let analysisTimeout = null;

    function renderPgn() {
        const history = game.history({ verbose: true });
        const pgnPane = document.getElementById("pgn-moves");
        pgnPane.innerHTML = "";
        
        const startSpan = document.createElement("span");
        startSpan.className = "pgn-move" + (currentPly === 0 ? " active" : "");
        startSpan.innerText = "Start";
        startSpan.onclick = () => goToPly(0);
        pgnPane.appendChild(startSpan);
        
        let movePair = null;
        for (let i = 0; i < history.length; i++) {
            if (i % 2 === 0) {
                movePair = document.createElement("div");
                movePair.className = "pgn-pair";
                const moveNum = document.createElement("span");
                moveNum.className = "pgn-move-num";
                moveNum.innerText = (Math.floor(i / 2) + 1) + ".";
                movePair.appendChild(moveNum);
                pgnPane.appendChild(movePair);
            }
            
            const moveSpan = document.createElement("span");
            moveSpan.className = "pgn-move" + (currentPly === i + 1 ? " active" : "");
            moveSpan.innerText = history[i].san;
            moveSpan.onclick = () => goToPly(i + 1);
            movePair.appendChild(moveSpan);
        }
    }

    function goToPly(plyIndex) {
        currentPly = plyIndex;
        if (plyIndex === 0) {
            board.setPosition(initialFen);
        } else {
            const history = game.history({ verbose: true });
            board.setPosition(history[plyIndex - 1].after);
        }
        renderPgn();
    }

    // Expose for global window if needed, but not necessary here.
    window.goToPly = goToPly;

    function inputHandler(event) {
        if (event.type === INPUT_EVENT_TYPE.moveStart) {
            // If we are looking at history, only allow moves if it's the correct turn for that history ply
            // Actually, we should temporarily set the chess.js state to the current ply to check legality
            return true;
        }

        if (event.type === INPUT_EVENT_TYPE.moveDone) {
            // If we are in history, truncate the future
            if (currentPly < game.history().length) {
                const historyToKeep = currentPly;
                while (game.history().length > historyToKeep) {
                    game.undo();
                }
            }

            const fenBeforeMove = game.fen(); 
            try {
                const moveResult = game.move({
                    from: event.squareFrom,
                    to: event.squareTo,
                    promotion: "q" 
                });
                
                if (!moveResult) {
                    // Invalid move, restore visual to current internal game state
                    board.setPosition(game.fen());
                    return false;
                }

                currentPly = game.history().length;
                board.setPosition(game.fen());
                board.removeMarkers();
                renderPgn();

                // Debounce analysis by 3 seconds
                clearTimeout(analysisTimeout);
                
                document.getElementById("output").style.display = "block";
                document.getElementById("output").innerHTML = "<em>Waiting 3 seconds for you to settle...</em>";
                document.getElementById("loading").style.display = "none";

                analysisTimeout = setTimeout(() => {
                    analyzeMoveOnBackend(fenBeforeMove, moveResult.lan, game.fen());
                }, 3000);

                return true; 
            } catch (err) {
                board.setPosition(game.fen());
                return false; 
            }
        }
    }

    board.enableMoveInput(inputHandler);
    renderPgn();

    async function analyzeMoveOnBackend(fenBefore, moveUci, fenAfter) {
        document.getElementById("output").style.display = "none";
        document.getElementById("loading").style.display = "block";
        console.log(`Sending POST to http://localhost:5267/api/analyze\nMove: ${moveUci}`);

        const promptTemplate = "You are an expert chess coach. The game history in PGN format is: {moveHistory}. The user just played {userMoveUci}. This move resulted in a {centipawnLoss} centipawn loss compared to the engine's top choice {bestUciMove}. The engine expected the continuation for the top choice to be: {bestLinePv}, and the continuation for the user's move leads to: {userLinePv}. IMPORTANT: Do not calculate chess moves yourself. Rely exclusively on the provided future continuation paths. If the centipawn loss is 0, congratulate them on finding the best move. If the loss is greater than 0, instruct the student on why their move was not optimal, explaining what they lost or what the ideal move would have gained. Be encouraging and concise. Format your response using Markdown. ALWAYS wrap specific chess moves in backticks (e.g. `e4`, `Nf3`) so they can be styled.";

        const moveHistory = game.pgn();

        try {
            const response = await fetch('http://localhost:5267/api/analyze/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fenBefore: fenBefore, movePlayedUci: moveUci, fenAfter: fenAfter, moveHistory: moveHistory, promptTemplate: promptTemplate })
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(`HTTP ${response.status}: ${text}`);
            }

            document.getElementById("loading").style.display = "none";
            document.getElementById("output").style.display = "block";
            let fullResponse = "";
            document.getElementById("output").innerHTML = "";
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        let dataStr = line.substring(6).replace(/\\n/g, '\n');
                        if (dataStr.startsWith('[ERROR]')) {
                            console.error(dataStr);
                        } else if (dataStr.startsWith('[METADATA]')) {
                            try {
                                const meta = JSON.parse(dataStr.substring(10).trim());
                                if (meta.bestUciMove && meta.bestUciMove.length >= 4 && meta.bestUciMove !== '0000') {
                                    const fromSq = meta.bestUciMove.substring(0, 2);
                                    const toSq = meta.bestUciMove.substring(2, 4);
                                    board.addMarker(MARKER_TYPE.frame, fromSq);
                                    board.addMarker(MARKER_TYPE.frame, toSq);
                                }
                            } catch(e) {
                                console.error("Error parsing metadata: ", e);
                            }
                        } else {
                            fullResponse += dataStr;
                            document.getElementById("output").innerHTML = marked.parse(fullResponse);
                        }
                    }
                }
            }
            
            console.log("Streaming Complete!");

        } catch (err) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("output").style.display = "block";
            document.getElementById("output").innerText = "Error connecting to coaching backend.";
            console.error(err);
        }
    }
</script>
</body>
</html>
